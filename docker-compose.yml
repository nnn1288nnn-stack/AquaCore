version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: aquaculture_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-aquaculture}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppass}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysql", "-u", "appuser", "-papppass123", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  golang-api:
    build:
      context: ./golang-api
      dockerfile: Dockerfile
    container_name: golang-api
    restart: always
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppass}
      DB_NAME: ${DB_NAME:-aquaculture}
      PORT: 8080
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - app-network

  python-ai:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    container_name: python-ai
    restart: always
    environment:
      GOLANG_API_URL: http://golang-api:8080
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppass}
      DB_NAME: ${DB_NAME:-aquaculture}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      - golang-api
    ports:
      - "8000:8000"
    networks:
      - app-network

  vue-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vue-frontend
    restart: always
    depends_on:
      - golang-api
      - python-ai
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "192.168.50.75:80:80"
      - "192.168.50.75:443:443"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
    networks:
      - app-network

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge
